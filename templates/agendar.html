{% extends 'base.html' %}

{% block titulo %}Agendar Cita - VetCitas{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0">
            <div class="card-header bg-success bg-gradient text-white">
                <h4 class="mb-0">
                    <i class="bi bi-plus-circle me-2"></i>Agendar Nueva Cita
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('agendar') }}">

                    <div class="mb-3">
                        <label for="mascota" class="form-label fw-semibold">
                            <i class="bi bi-heart-fill text-danger me-1"></i> Nombre de la Mascota
                        </label>
                        <input type="text" class="form-control" id="mascota" name="mascota"
                               placeholder="Ej: Firulais" required>
                    </div>

                    <div class="mb-3">
                        <label for="propietario" class="form-label fw-semibold">
                            <i class="bi bi-person-fill text-primary me-1"></i> Propietario
                        </label>
                        <input type="text" class="form-control" id="propietario" name="propietario"
                               placeholder="Ej: Juan Pérez" required>
                    </div>

                    <div class="mb-3">
                        <label for="especie" class="form-label fw-semibold">
                            <i class="bi bi-tag-fill text-warning me-1"></i> Especie
                        </label>
                        <select class="form-select" id="especie" name="especie">
                            <option value="" selected disabled>Selecciona una especie</option>
                            <option value="Perro">🐶 Perro</option>
                            <option value="Gato">🐱 Gato</option>
                            <option value="Ave">🐦 Ave</option>
                            <option value="Conejo">🐰 Conejo</option>
                            <option value="Tortuga">🐢 Tortuga</option>
                            <option value="Pez">🐟 Pez</option>
                            <option value="Otro">🐾 Otro</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="fecha" class="form-label fw-semibold">
                            <i class="bi bi-calendar-event-fill text-info me-1"></i> Fecha de la Cita
                        </label>
                        <input type="date" class="form-control" id="fecha" name="fecha" required>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('agenda') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Volver
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle"></i> Agendar Cita
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
